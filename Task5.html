<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>Списки</h1>
<h3>Маркированный список</h3>
<ul>
    <li>Пункт 1</li>
    <li>Пункт 2</li>
    <li>Пункт 3</li>
    <li>Пункт 4</li>
</ul>
<h3>Упорядоченный список</h3>
<ol>
    <li>Пункт 1</li>
    <li>Пункт 2</li>
    <li>Пункт 3</li>
    <li>Пункт 4</li>
    <h3>Вложенный список</h3>
    <ul>
        <u>
            <li>Пункт 1</li>
        </u>
        <s>
            <li>Пункт 2</li>
        </s>
        <b>
            <li>Пункт 3</li>
        </b>
        <i>
            <li>Пункт 4</li>
        </i>
    </ul>
</ol>
</body>
</html>
